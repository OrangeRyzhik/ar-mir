<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Урок 4 - Итоговый тест по Биологии</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }
        
        .lesson-hero {
            background: linear-gradient(135deg, #166534 0%, #4ade80 100%);
        }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
            <a href="biology.html" class="flex items-center gap-2 text-emerald-600 font-medium">
                ← Назад к Биологии
            </a>
            <span class="title-font text-2xl font-bold text-emerald-600">AR Мир</span>
        </div>
    </nav>

    <section class="lesson-hero text-white py-16">
        <div class="max-w-4xl mx-auto px-6 text-center">
            <div class="inline-flex items-center gap-3 bg-white/20 backdrop-blur-md px-6 py-3 rounded-3xl mb-6">
                <span class="text-4xl">📝</span>
                <span class="font-semibold">Урок 4</span>
            </div>
            <h1 class="title-font text-5xl md:text-6xl font-bold leading-tight mb-6">
                Итоговый тест
            </h1>
            <p class="text-xl text-white/90">Проверь свои знания по биологии</p>
        </div>
    </section>

    <div class="max-w-4xl mx-auto px-6 py-12">
        <div id="testContent"></div>

        <!-- Результат теста -->
        <div id="resultScreen" class="hidden text-center py-20">
            <div class="text-7xl mb-8">🏆</div>
            <h2 class="text-5xl font-bold text-emerald-600 mb-4">Тест завершён!</h2>
            <p id="resultText" class="text-3xl font-semibold mb-10"></p>
            <button onclick="restartTest()" 
                    class="px-12 py-6 bg-emerald-600 text-white text-xl font-semibold rounded-3xl hover:bg-emerald-700 transition">
                Пройти тест заново
            </button>
            <button onclick="window.location.href='biology.html'" 
                    class="ml-4 px-12 py-6 bg-gray-200 text-gray-800 text-xl font-semibold rounded-3xl hover:bg-gray-300 transition">
                Вернуться к Биологии
            </button>
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "Что такое биология?",
                a: ["Наука о Земле", "Наука о жизни", "Наука о космосе", "Наука о компьютерах"],
                correct: 1
            },
            {
                q: "Что является самой маленькой единицей жизни?",
                a: ["Орган", "Клетка", "Ткань", "Система органов"],
                correct: 1
            },
            {
                q: "Как называется «мозг» клетки?",
                a: ["Митохондрия", "Ядро", "Цитоплазма", "Мембрана"],
                correct: 1
            },
            {
                q: "Что такое орган?",
                a: ["Самая маленькая часть организма", "Часть организма, выполняющая определённую функцию", "Группа клеток одного вида", "Вся система органов"],
                correct: 1
            },
            {
                q: "Какая система органов отвечает за доставку кислорода в организм?",
                a: ["Пищеварительная", "Нервная", "Дыхательная", "Сердечно-сосудистая"],
                correct: 2
            },
            {
                q: "Что является главной функцией митохондрий?",
                a: ["Хранение наследственной информации", "Выработка энергии", "Защита клетки", "Переваривание пищи"],
                correct: 1
            },
            {
                q: "Сколько примерно клеток в теле человека?",
                a: ["Около 37 триллионов", "Около 100 тысяч", "Около 1 миллиона", "Около 1 миллиарда"],
                correct: 0
            },
            {
                q: "Почему важно изучать биологию?",
                a: ["Чтобы понимать, как устроен наш организм и природа", "Только для врачей", "Чтобы научиться готовить еду", "Только для учёных"],
                correct: 0
            }
        ];

        let currentQuestion = 0;
        let score = 0;

        function loadQuestion() {
            const q = questions[currentQuestion];
            let html = `
                <div class="max-w-2xl mx-auto">
                    <div class="text-center mb-10">
                        <span class="text-sm font-medium text-emerald-600">Вопрос ${currentQuestion + 1} из ${questions.length}</span>
                    </div>
                    <h2 class="text-3xl font-semibold mb-10 text-center">${q.q}</h2>
                    <div class="grid gap-4">
            `;

            q.a.forEach((answer, index) => {
                html += `
                    <button onclick="selectAnswer(${index})" 
                            class="answer-btn w-full text-left p-6 border-2 border-gray-200 rounded-2xl hover:border-emerald-500 transition text-lg">
                        ${answer}
                    </button>
                `;
            });

            html += `</div></div>`;
            document.getElementById('testContent').innerHTML = html;
        }

        function selectAnswer(selectedIndex) {
            const q = questions[currentQuestion];
            if (selectedIndex === q.correct) score++;

            currentQuestion++;

            if (currentQuestion < questions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            const percent = Math.round((score / questions.length) * 100);
            
            let message = "";
            if (percent >= 90) message = "Отличный результат! 🌟";
            else if (percent >= 70) message = "Хороший результат! 👍";
            else if (percent >= 50) message = "Неплохо! Можно лучше 😊";
            else message = "Рекомендуем повторить материал 📚";

            document.getElementById('testContent').classList.add('hidden');
            document.getElementById('resultScreen').classList.remove('hidden');
            document.getElementById('resultText').innerHTML = `
                Правильных ответов: <span class="text-4xl font-bold text-emerald-600">${score}/${questions.length}</span><br>
                ${percent}% — ${message}
            `;

            localStorage.setItem('bio_lesson_4_completed', 'true');
        }

        function restartTest() {
            currentQuestion = 0;
            score = 0;
            document.getElementById('testContent').classList.remove('hidden');
            document.getElementById('resultScreen').classList.add('hidden');
            loadQuestion();
        }

        window.onload = loadQuestion;
    </script>
</body>
</html>
